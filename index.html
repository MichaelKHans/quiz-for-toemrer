<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tømrer Quiz | Uddannelsen</title>
    <meta name="description" content="Læringsplatform for tømrerstuderende om arbejdsmiljø og svampe.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tømrer Quiz</h1>
            <button class="btn btn-accent" id="live-join-btn" onclick="showLiveJoinModal()" style="margin: 1rem auto; display: none; background: #6366f1;">🚀 Deltag i Live Quiz</button>
            <p class="subtitle">Test din faglige viden og hold dig opdateret på tømrerfaget</p>
        </header>

        <section class="progress-section">
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-label" id="progress-label">Henter din fremgang...</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </section>

        <nav id="category-selector" class="category-selector">
            <!-- Kategorier indlæses her -->
        </nav>

        <main id="quiz-grid" class="quiz-grid">

            <!-- Quiz cards indlæses dynamisk her -->
        </main>
    </div>

    <!-- Admin Trigger (Hængelås) -->
    <div class="admin-trigger" onclick="tryLogin()" title="Lærer Login">
        🔒
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tømrer Quiz - Panel (Underviser)</h2>
                <button class="btn-icon" onclick="closeAdmin()">✖</button>
            </div>
            <div class="modal-body" id="admin-content-inner">
                <!-- Admin indhold indlæses her -->
            </div>
        </div>
    </div>

    <!-- AI Creation Modal (v5.5.0 Restored) -->
    <div id="ai-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>✨ Skab med AI</h2>
                <button class="btn-icon" onclick="closeAIModal()">✖</button>
            </div>
            <div class="modal-body" style="padding: 2rem; text-align: center;">
                <p style="margin-bottom: 2rem; opacity: 0.8;">Indtast et emne, så skaber AI'en en unik quiz til dig.</p>
                <input type="text" id="ai-topic-input" placeholder="F.eks. 'Sikkerhed på stilladser'..." style="width: 100%; padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px;">
                <button class="btn btn-primary btn-large" id="ai-generate-btn" onclick="generateQuizWithAI()">Generer Quiz 🚀</button>
                <div id="ai-loading" style="display: none; margin-top: 2rem;">
                    <div class="loader" style="margin: 0 auto 1rem;">⌛</div>
                    <p>AI'en tænker... (ca. 10-20 sekunder)</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Logbog Modal (v5.5.0 Restored) -->
    <div id="log-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>📜 System Logbog</h2>
                <button class="btn-icon" onclick="closeLogModal()">✖</button>
            </div>
            <div class="modal-body" id="log-content" style="padding: 1.5rem; max-height: 70vh; overflow-y: auto;">
                <!-- Log indlæses her -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/database.js"></script>
    <script src="js/memory.js"></script>
    <script type="module" src="js/skills.js?v=5.5.0"></script>
    <script type="module" src="js/admin.js?v=5.5.0"></script>
</body>
<!-- Rebuild trigger v5.5.0 -->
<!-- GitHub Pages Refresh Trigger v5.5.0 -->
</html>
